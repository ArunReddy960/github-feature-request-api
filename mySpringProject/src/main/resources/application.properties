# ========================================
# GITHUB API CONFIGURATION
# ========================================
# WHY: Connect to GitHub to create issues
github.token=${GITHUB_TOKEN}
github.owner=${GITHUB_OWNER:ArunReddy960}
github.repo=${GITHUB_REPO:Mockmaster}
github.api.url=https://api.github.com
github.api.version=2022-11-28
github.user.agent=FeatureRequestProcessor/1.0

# ========================================
# DATABASE CONFIGURATION
# ========================================
# WHY: Connect to PostgreSQL database
spring.datasource.url=jdbc:postgresql://localhost:5432/feature_requests_db
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================================
# JPA/HIBERNATE CONFIGURATION
# ========================================
# WHY: Auto-create/update database tables from Entity classes
spring.jpa.hibernate.ddl-auto=update

# WHY: Use PostgreSQL-specific SQL dialect for optimization
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# WHY: Show SQL queries in console (formatted nicely)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ========================================
# LOGGING CONFIGURATION
# ========================================

# WHY: Format logs with timestamp, thread, level, and class name
# BENEFIT: Easy to read and track which thread handled which request
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# WHY: Show DEBUG logs from YOUR code (Controller, Service, Repository)
# BENEFIT: See your custom log.debug() and log.info() messages
logging.level.com.example.mySpringProject=DEBUG

# WHY: Show SQL queries generated by Hibernate
# BENEFIT: Understand what database operations are happening
logging.level.org.hibernate.SQL=DEBUG

# WHY: Show ACTUAL VALUES being bound to SQL (the ? placeholders)
# BENEFIT: See exactly what data is being inserted/updated
# EXAMPLE: "binding parameter [1] as [VARCHAR] - [Jane Doe]"
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# WHY: Show Spring web framework activity (request routing, responses)
# BENEFIT: See how URLs map to controllers and HTTP status codes
logging.level.org.springframework.web=DEBUG